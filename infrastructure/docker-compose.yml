services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: notifyflow-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - notifyflow-network

  zipkin:
    image: openzipkin/zipkin
    container_name: notifyflow-zipkin
    ports:
      - "9411:9411"
    networks:
      - notifyflow-network

  prometheus:
    image: prom/prometheus
    container_name: notifyflow-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - user-service
      - notification-service
      - gateway-service
    networks:
      - notifyflow-network

  grafana:
    image: grafana/grafana
    container_name: notifyflow-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASS:-admin}
    volumes:
      - ./provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - notifyflow-network

  user-service:
    build:
      context: ../services/user-service
      dockerfile: Dockerfile
    container_name: notifyflow-user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-guest}
      ZIPKIN_URL: http://zipkin:9411
    depends_on:
      rabbitmq:
        condition: service_healthy
      zipkin:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - notifyflow-network

  notification-service:
    build:
      context: ../services/notification-service
      dockerfile: Dockerfile
    container_name: notifyflow-notification-service
    ports:
      - "8082:8082"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-guest}
      ZIPKIN_URL: http://zipkin:9411
    depends_on:
      rabbitmq:
        condition: service_healthy
      zipkin:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - notifyflow-network

  gateway-service:
    build:
      context: ../services/gateway-service
      dockerfile: Dockerfile
    container_name: notifyflow-gateway-service
    ports:
      - "8083:8080"
    environment:
      PORT: 8080
      USER_SERVICE_URL: http://user-service:8081
      ZIPKIN_URL: http://zipkin:9411
    depends_on:
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - notifyflow-network

networks:
  notifyflow-network:
    driver: bridge
